<!DOCTYPE html>

<head>

    <title> HTML TABLE </title>
    </head>
    <body>
        <h2> Table With Uncollapsed Borders </h2>
        <table border="2" style="border-collapse:uncollapse;">
            <tr>
                <th> Name</th>
                <th>Job Title </th>
                <th>Email Address</th>
            </tr>
            <tr>
                
                <td>Anna Fitzgerald</td>
                <td>Staff Writer </td>
                <td>example@company.com</tdtd>
            </tr>
            <tr>
               <td>John Smith</td>
                <td>Marketing Manager</td>
                <td>example2@company.com</td>
            </tr>
            <tr>
                <td>Zendra Grace</td>
                <td>CEO</td>
                <td>example3@company.com</td>
            </tr>
        </table>
    </body>
    </html>
