<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Roboto", sans-serif;
}
.login-box{
    width: 430px;
    min-height: 380px;
    /* border: 1px solid; */
    margin: 30px auto 0;
    border-radius: 10px;
    box-shadow: 1px 1px 10px 1px #878484;
    padding: 50px 40px;
    text-align: center;
    line-height: 40px;
}
.login-box h1{
    font-size: 36px;
}
form > input{
    width: 100%;
    padding: 10px;
    border-radius: 5px;
    margin: 20px 0;
    font-size: 18px;
    border: 1px solid gray;
    outline: none;
}
form > p{
    display: flex;
    justify-content: space-between;
}
a{
    color: #3B81F6;
    font-weight: 700;
    text-decoration: none;
}
button{
    width: 100%;
    padding: 15px 0;
    font-size: 18px;
    border: none;
    background-color: #3B81F6;
    color: white;
    font-weight: 500;
    border-radius: 5px;
    margin: 20px 0;
}
</style>
</head>
<body>
  <div class="login-box">
    <h1>Sign In</h1>
    <p>Enter Your Credentials To Continue</p>
    <form>
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">
        <p>
            <span>
              <input type="checkbox"> <label>Remember me</label>
            </span>
            <span>
              <a href="#">Forgot Password</a>
            </span>
        </p>
        <button>Sign In</button>
    </form>
    <p>Don't Have An account ? <span><a href="#">Create One</a></span></p>
  </div>
</body>
</html>
